services:
  api:
    build: ./nearest-milestone-api
    ports:
      - "${PORT:-3000}:3000"
    env_file: ./nearest-milestone-api/.env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  bot:
    build: ./telegram-bot
    env_file: ./telegram-bot/.env
    environment:
      - API_URL=http://api:3000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
